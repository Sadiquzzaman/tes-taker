version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tasktaker-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres123}
      POSTGRES_DB: ${DATABASE_DB:-tasktaker}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tasktaker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tasktaker-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - tasktaker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasktaker-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres123}
      DATABASE_DB: ${DATABASE_DB:-tasktaker}
      DATABASE_SYNCRONIZE: ${DATABASE_SYNCRONIZE:-true}
      DATABASE_LOGGING: ${DATABASE_LOGGING:-false}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      # App
      APP_PORT: ${APP_PORT:-3000}
      # SMS
      BULKSMS_API_KEY: ${BULKSMS_API_KEY:-}
      BULKSMS_SENDER_ID: ${BULKSMS_SENDER_ID:-}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - tasktaker-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  tasktaker-network:
    driver: bridge
