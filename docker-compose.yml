version: "3.9"

services:
  test-taker-frontend:
    container_name: tasktaker-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - tasktaker-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    container_name: tasktaker-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres123}
      POSTGRES_DB: ${DATABASE_DB:-tasktaker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tasktaker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tasktaker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tasktaker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasktaker-app
    ports:
      - "4000:3000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - /app/node_modules
      # - /app/dist
    networks:
      - tasktaker-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: tasktaker-adminer
    restart: unless-stopped
    ports:
      - "8078:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - tasktaker-network
    depends_on:
      - postgres

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: tasktaker-redis-insight
    restart: unless-stopped
    ports:
      - "5530:5540"
    networks:
      - tasktaker-network
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:

networks:
  tasktaker-network:
    driver: bridge

